# Training configuration for shutter speed control.
# Trains a full-model LoRA (rank=32) jointly with FPS adapters on the deepest third of
# transformer blocks. At inference, use --graft to apply adapters only to the deepest third.

# Output path for training runs. Each run creates a timestamped subdirectory here.
output_dir = './output'
train_name = 'shutter'

# Dataset config file.
dataset = './configs/dataset_shutter.toml'

# training settings

epochs = 1000
# Batch size of a single forward/backward pass for one GPU.
micro_batch_size_per_gpu = 1
# Pipeline parallelism degree. A single instance of the model is divided across this many GPUs.
pipeline_stages = 1
# Number of micro-batches sent through the pipeline for each training step.
# If pipeline_stages > 1, a higher GAS means better GPU utilization due to smaller pipeline bubbles.
gradient_accumulation_steps = 4
# Grad norm clipping.
gradient_clipping = 1.0
warmup_steps = 100

# eval settings

eval_every_n_epochs = 1
eval_before_first_step = true
# Might want to set these lower for eval so that less images get dropped (eval dataset size is
# usually much smaller than training set). Each size bucket is rounded down to the nearest
# multiple of the global batch size.
eval_micro_batch_size_per_gpu = 1
eval_gradient_accumulation_steps = 1

# misc settings

# Save an adapter checkpoint every N epochs. Increase if disk space is a concern.
save_every_n_epochs = 25
save_every_n_steps = 1000
# Checkpoint the full training state for resumption. Set only one of these.
#checkpoint_every_n_epochs = 1
checkpoint_every_n_minutes = 60
# Always set to true unless you have a huge amount of VRAM.
activation_checkpointing = true
# Controls how DeepSpeed divides layers across GPUs.
partition_method = 'parameters'
# dtype for saving the LoRA weights.
save_dtype = 'bfloat16'
# Batch size for caching latents and text embeddings.
caching_batch_size = 1
# How often DeepSpeed logs to console.
steps_per_print = 1
# How to extract video clips from an input video file.
# single_beginning / single_middle / multiple_overlapping. Default: single_middle.
video_clip_mode = 'single_middle'


[model]
type = 'wan'
ckpt_path = '/path/to/Wan2.1-T2V-14B'  # download from HuggingFace: Wan-AI/Wan2.1-T2V-14B
dtype = 'bfloat16'
# You can use fp8 for the transformer when training LoRA.
#transformer_dtype = 'float8'
timestep_sample_method = 'logit_normal'

# FPS adapter configuration
# Conditioning scalar transform: 'raw' passes the scalar value directly to the embedding MLP.
fps_tau_transform = "raw"
fps_tau_scale = 1.0

# Number of conditioning tokens injected per adapter block.
fps_adapter_num_tokens = 4

# Output dimension of the FPS conditioning MLP.
fps_embed_dim = 256

# Initial gate value (only used when fps_gate_mode = "learned").
fps_adapter_gate_init = 0.0

# LoRA alpha for FPS adapters; effective scale = alpha / rank = 32 / 32 = 1.0.
fps_lora_alpha = 32.0

# Gate mode: 'fixed' uses a constant gate value; 'learned' trains the gate from fps_adapter_gate_init.
fps_gate_mode = "fixed"
fps_gate_fixed_value = 0.5

# Rank and block scope for FPS adapters.
fps_adapter_rank = 32
fps_condition_blocks = "deepest_third"  # applies to the deepest third of transformer blocks

[adapter]
type = 'lora'
rank = 32
dtype = 'bfloat16'

[optimizer]
# AdamW from the optimi library uses Kahan summation for stable bfloat16 training.
type = 'adamw_optimi'
lr = 2e-05
betas = [0.9, 0.99]
weight_decay = 0.01
eps = 1e-8
