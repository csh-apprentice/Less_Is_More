# Ablation configuration: LoRA restricted to the deepest third of transformer blocks only.
# Identical to train_temperature.toml except lora_blocks = 'deepest_third' under [adapter],
# which matches the FPS adapter block set. Used to isolate the contribution of full-model LoRA.

# Output path for training runs. Each run creates a timestamped subdirectory here.
output_dir = './output'
train_name = 'temperature_ablation'

# Dataset config file.
dataset = './configs/dataset_temperature.toml'

# training settings

epochs = 1000
# Batch size of a single forward/backward pass for one GPU.
micro_batch_size_per_gpu = 1
# Pipeline parallelism degree. A single instance of the model is divided across this many GPUs.
pipeline_stages = 1
# Number of micro-batches sent through the pipeline for each training step.
gradient_accumulation_steps = 4
# Grad norm clipping.
gradient_clipping = 1.0
warmup_steps = 100

# eval settings

eval_every_n_epochs = 1
eval_before_first_step = true
eval_micro_batch_size_per_gpu = 1
eval_gradient_accumulation_steps = 1

# misc settings

save_every_n_epochs = 25
save_every_n_steps = 1000
#checkpoint_every_n_epochs = 1
checkpoint_every_n_minutes = 60
activation_checkpointing = true
partition_method = 'parameters'
save_dtype = 'bfloat16'
caching_batch_size = 1
steps_per_print = 1
video_clip_mode = 'single_middle'


[model]
type = 'wan'
ckpt_path = '/path/to/Wan2.1-T2V-14B'  # download from HuggingFace: Wan-AI/Wan2.1-T2V-14B
dtype = 'bfloat16'
#transformer_dtype = 'float8'
timestep_sample_method = 'logit_normal'

fps_tau_transform = "raw"
fps_tau_scale = 1.0
fps_reference_fps = 1.0
fps_adapter_num_tokens = 4
fps_embed_dim = 256
fps_adapter_gate_init = 0.0
fps_lora_alpha = 32.0
fps_gate_mode = "fixed"
fps_gate_fixed_value = 0.5
fps_adapter_rank = 32
fps_condition_blocks = "deepest_third"

[adapter]
type = 'lora'
rank = 32
dtype = 'bfloat16'
# Restrict LoRA to the deepest third of transformer blocks (same block set as FPS adapters).
# Remove or comment out this line to train full-model LoRA (paper's default).
lora_blocks = 'deepest_third'

[optimizer]
type = 'adamw_optimi'
lr = 2e-05
betas = [0.9, 0.99]
weight_decay = 0.01
eps = 1e-8
